name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/touken928/wirehub

jobs:
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: linux
            goarch: arm64
            name: linux-arm64
          - goos: darwin
            goarch: arm64
            name: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          out="dist/wirehub-${{ matrix.name }}"
          go build -ldflags="-s -w" -o "$out" ./cmd/wirehub
          chmod +x "$out"
          (cd dist && sha256sum "wirehub-${{ matrix.name }}" > "wirehub-${{ matrix.name }}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: wirehub-${{ matrix.name }}
          path: |
            dist/wirehub-${{ matrix.name }}
            dist/wirehub-${{ matrix.name }}.sha256

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

  release:
    name: Create GitHub Release
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wirehub-*
          merge-multiple: true

      - name: Package archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p release
          for name in linux-amd64 linux-arm64 darwin-arm64; do
            tar -czf "release/wirehub-${VERSION}-${name}.tar.gz" -C dist "wirehub-${name}"
            cp "dist/wirehub-${name}.sha256" "release/wirehub-${VERSION}-${name}.sha256"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/touken928/wirehub:${{ github.ref_name }}
            docker run -d --name wirehub \
              -p 8443:8443 -p 8443:8443/udp \
              -v wirehub-data:/app/data \
              ghcr.io/touken928/wirehub:${{ github.ref_name }}
            ```

            Image: `ghcr.io/touken928/wirehub:${{ github.ref_name }}` (also tagged `latest`).

            ## Binaries

            | Platform | Archive |
            |----------|---------|
            | Linux amd64 | `wirehub-${{ github.ref_name }}-linux-amd64.tar.gz` |
            | Linux arm64 | `wirehub-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | macOS arm64 | `wirehub-${{ github.ref_name }}-darwin-arm64.tar.gz` |

            Extract and run:

            ```bash
            tar -xzf wirehub-vX.Y.Z-linux-amd64.tar.gz
            ./wirehub-linux-amd64 --data-dir ./data
            ```

            Open http://localhost:8443/setup on first run.
