name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/touken928/wirehub

jobs:
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: linux-amd64
            ext: ''
          - goos: linux
            goarch: arm64
            name: linux-arm64
            ext: ''
          - goos: darwin
            goarch: arm64
            name: darwin-arm64
            ext: ''
          - goos: windows
            goarch: amd64
            name: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          out="dist/wirehub-${{ matrix.name }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$out" ./cmd/wirehub
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod +x "$out"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wirehub-${{ matrix.name }}
          path: dist/wirehub-${{ matrix.name }}${{ matrix.ext }}

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

  release:
    name: Create GitHub Release
    needs: [build-binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wirehub-*
          merge-multiple: true

      - name: Stage release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p release
          cp dist/wirehub-linux-amd64 "release/wirehub-${VERSION}-linux-amd64"
          cp dist/wirehub-linux-arm64 "release/wirehub-${VERSION}-linux-arm64"
          cp dist/wirehub-darwin-arm64 "release/wirehub-${VERSION}-darwin-arm64"
          cp dist/wirehub-windows-amd64.exe "release/wirehub-${VERSION}-windows-amd64.exe"
          chmod +x release/wirehub-${VERSION}-linux-amd64 \
                    release/wirehub-${VERSION}-linux-arm64 \
                    release/wirehub-${VERSION}-darwin-arm64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/touken928/wirehub:${{ github.ref_name }}
            docker run \
              -p 8443:8443 -p 8443:8443/udp \
              -v wirehub-data:/app/data \
              ghcr.io/touken928/wirehub:${{ github.ref_name }}
            ```

            Image: `ghcr.io/touken928/wirehub:${{ github.ref_name }}` (also tagged `latest`).

            ## Binaries

            Uncompressed executables (download the file for your platform from the assets below).

            | Platform | Asset |
            |----------|-------|
            | Linux amd64 | `wirehub-${{ github.ref_name }}-linux-amd64` |
            | Linux arm64 | `wirehub-${{ github.ref_name }}-linux-arm64` |
            | macOS arm64 | `wirehub-${{ github.ref_name }}-darwin-arm64` |
            | Windows amd64 | `wirehub-${{ github.ref_name }}-windows-amd64.exe` |

            Linux / macOS:

            ```bash
            chmod +x wirehub-${{ github.ref_name }}-linux-amd64
            ./wirehub-${{ github.ref_name }}-linux-amd64 --data-dir ./data
            ```

            Windows (PowerShell):

            ```powershell
            .\wirehub-${{ github.ref_name }}-windows-amd64.exe --data-dir .\data
            ```

            Open http://localhost:8443/setup on first run.
